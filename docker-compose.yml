version: '3.8'

services:
  vectoraidb:
    image: williamimoh/actian-vectorai-db:1.0b
    platform: linux/amd64
    ports:
      - "50051:50051"
    volumes:
      - vectorai-data:/data
    restart: unless-stopped

  vectorai-bridge:
    build: ./vectorai-bridge
    ports:
      - "8001:8001"
    environment:
      - VECTORAI_HOST=vectoraidb
      - VECTORAI_PORT=50051
    depends_on:
      - vectoraidb
    restart: unless-stopped

  model-server:
    build: ./model-server
    ports:
      - "8002:8002"
    restart: unless-stopped
    # Mount a named volume so downloaded HuggingFace model weights survive rebuilds
    volumes:
      - hf-model-cache:/root/.cache/huggingface
    environment:
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_HOME=/root/.cache/huggingface

volumes:
  vectorai-data:
  hf-model-cache:
